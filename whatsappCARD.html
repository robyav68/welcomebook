<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: #f0ede8; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }

.card {
  width: 100%;
  max-width: 420px;
  background: linear-gradient(160deg, #1a3a2a 0%, #2d5a3d 55%, #3d6e50 100%);
  border-radius: 24px;
  overflow: hidden;
  box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  text-align: center;
  text-decoration: none;
  display: block;
  transition: transform 0.2s, box-shadow 0.2s;
}
.card:hover { transform: translateY(-4px); box-shadow: 0 28px 70px rgba(0,0,0,0.35); }

.card-top {
  padding: 44px 32px 32px;
  position: relative;
}
.card-top::before {
  content:'';
  position:absolute;inset:0;
  background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23ffffff' fill-opacity='0.04'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/svg%3E");
}

.logo-wrap {
  background: #fff;
  border-radius: 16px;
  padding: 16px 24px;
  display: inline-block;
  position: relative;
  box-shadow: 0 4px 20px rgba(0,0,0,0.2);
}
.logo-wrap img { width: 180px; display: block; }

.welcome {
  font-family: 'Cormorant Garamond', serif;
  font-size: 22px;
  font-weight: 300;
  font-style: italic;
  color: rgba(255,255,255,0.88);
  margin-top: 24px;
  position: relative;
}
.welcome strong { color: #d4956e; font-style: normal; font-weight: 400; }

.divider {
  width: 48px; height: 2px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.35), transparent);
  margin: 20px auto;
}

.tagline {
  font-size: 12px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.5);
  position: relative;
}

.card-bottom {
  background: #0f2419;
  border-top: 3px solid #3a7d44;
  padding: 24px 32px 28px;
}

.cta-text {
  font-size: 13px;
  color: rgba(255,255,255,0.6);
  letter-spacing: 0.04em;
  margin-bottom: 14px;
}

.cta-btn {
  display: inline-block;
  background: linear-gradient(135deg, #3a7d44, #5a9e6a);
  color: #fff;
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 14px 32px;
  border-radius: 30px;
  box-shadow: 0 4px 18px rgba(58,125,68,0.4);
  text-decoration: none;
}

.features {
  display: flex;
  justify-content: center;
  gap: 18px;
  margin-top: 20px;
  flex-wrap: wrap;
}
.feat {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  color: rgba(255,255,255,0.55);
  font-size: 11px;
  letter-spacing: 0.04em;
}
.feat .icon { font-size: 18px; }
</style>
